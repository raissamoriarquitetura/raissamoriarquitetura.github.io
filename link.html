<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raíssa Mori — Arquitetura e Interiores</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Montserrat',sans-serif;
  background:#0e0e0e;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* Background */
.bg{
  position:fixed;inset:0;z-index:0;
  background-image:url('imgs/raissa1.jpg');
  background-size:cover;
  background-position:center top;
  filter:brightness(0.25) saturate(0.6);
  transform:scale(1.05);
  animation:bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse{
  from{transform:scale(1.05);}
  to{transform:scale(1.1);}
}

/* Grain overlay */
.grain{
  position:fixed;inset:0;z-index:1;
  opacity:0.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* Gold line top */
.line-top{
  position:fixed;top:0;left:0;right:0;height:2px;z-index:10;
  background:linear-gradient(to right,transparent,#b89a6a,transparent);
  animation:fadeIn 1.5s ease both;
}

/* Card */
.card{
  position:relative;z-index:10;
  width:100%;max-width:420px;
  padding:56px 40px 48px;
  text-align:center;
  animation:cardUp 1s 0.3s both;
}

@keyframes cardUp{
  from{opacity:0;transform:translateY(32px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes fadeIn{
  from{opacity:0;}to{opacity:1;}
}

/* Avatar */
.avatar{
  width:96px;height:96px;
  border-radius:50%;
  border:1px solid rgba(184,154,106,0.6);
  overflow:hidden;
  margin:0 auto 24px;
  box-shadow:0 0 0 4px rgba(184,154,106,0.12);
  animation:fadeIn 1s 0.6s both;
}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:top;}

/* Name */
.name{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;font-weight:300;
  color:white;letter-spacing:1px;
  margin-bottom:6px;
  animation:fadeIn 1s 0.8s both;
}
.name span{color:#b89a6a;font-style:italic;}

.tagline{
  font-size:10px;letter-spacing:4px;text-transform:uppercase;
  color:rgba(255,255,255,0.4);
  margin-bottom:8px;
  animation:fadeIn 1s 0.9s both;
}

.desc{
  font-size:12px;line-height:1.8;
  color:rgba(255,255,255,0.5);
  margin-bottom:40px;
  animation:fadeIn 1s 1s both;
}

/* Divider */
.divider{
  display:flex;align-items:center;gap:12px;
  margin-bottom:32px;
  animation:fadeIn 1s 1s both;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:rgba(184,154,106,0.25);
}
.divider span{
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(184,154,106,0.5);
}

/* Buttons */
.buttons{
  display:flex;flex-direction:column;gap:12px;
  animation:fadeIn 1s 1.1s both;
}

.btn{
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding:16px 28px;
  text-decoration:none;
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  font-family:'Montserrat',sans-serif;font-weight:400;
  border-radius:1px;
  transition:all 0.35s ease;
  position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:white;opacity:0;
  transition:opacity 0.35s;
}
.btn:hover::before{opacity:0.04;}

.btn-site{
  background:transparent;
  border:1px solid rgba(184,154,106,0.7);
  color:rgba(255,255,255,0.85);
}
.btn-site:hover{
  border-color:var(--gold);
  color:white;
  box-shadow:0 0 24px rgba(184,154,106,0.15);
}

.btn-whats{
  background:#b89a6a;
  border:1px solid #b89a6a;
  color:#0e0e0e;
  font-weight:500;
}
.btn-whats:hover{
  background:#cba97a;
  border-color:#cba97a;
  box-shadow:0 8px 32px rgba(184,154,106,0.3);
  transform:translateY(-1px);
}

.btn-icon{font-size:16px;line-height:1;}

/* Footer */
.footer-text{
  margin-top:40px;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.2);
  animation:fadeIn 1s 1.3s both;
}

/* Stats */
.stats{
  display:flex;justify-content:center;gap:32px;
  margin-bottom:36px;
  animation:fadeIn 1s 1s both;
}
.stat{text-align:center;}
.stat-n{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;font-weight:300;
  color:#b89a6a;line-height:1;
}
.stat-l{
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,0.3);margin-top:3px;
}

@media(max-width:480px){
  .card{padding:48px 28px 40px;}
  .name{font-size:28px;}
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="grain"></div>
<div class="line-top"></div>

<div class="card">

  <div class="avatar">
    <img src="imgs/raissa1.jpg" alt="Raíssa Mori">
  </div>

  <h1 class="name">Raíssa <span>Mori</span></h1>
  <p class="tagline">Arquitetura · Interiores · Brasil</p>
  <p class="desc">Projetos residenciais de alto padrão<br>e clínicas médicas em todo o Brasil.</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-n">210+</div>
      <div class="stat-l">Projetos</div>
    </div>
    <div class="stat">
      <div class="stat-n">10+</div>
      <div class="stat-l">Anos</div>
    </div>
    <div class="stat">
      <div class="stat-n">BR</div>
      <div class="stat-l">Todo Brasil</div>
    </div>
  </div>

  <div class="divider"><span>Escolha uma opção</span></div>

  <div class="buttons">
    <a href="https://raissamoriarquitetura.com" target="_blank" class="btn btn-site">
      <span class="btn-icon">🌐</span>
      Ver Portfólio Completo
    </a>
    <a href="https://wa.me/5535998858448?text=Olá%20Raíssa!%20Vi%20seu%20trabalho%20no%20Instagram%20e%20gostaria%20de%20solicitar%20um%20orçamento." target="_blank" class="btn btn-whats">
      <span class="btn-icon">💬</span>
      Solicitar Orçamento
    </a>
  </div>

  <p class="footer-text">© 2025 Raíssa Mori Arquitetura</p>

</div>

</body>
</html>
